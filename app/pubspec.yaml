name: certify
description: Certify — study, certify, repeat.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  webview_flutter: ^4.8.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.3
  flutter_timezone: ^4.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# Generates platform launcher icons from a single source PNG.
# 1. Save the 1024x1024 icon at assets/icon/icon.png
# 2. Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#0A0B11"
  adaptive_icon_foreground: "assets/icon/icon.png"
