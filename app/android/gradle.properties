org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Disabled to work around a Kotlin incremental-compilation crash on Windows when
# the pub cache (C:) and project (D:) sit on different drive roots. The compiler
# can't compute a relative path across drives, so it fails closing its caches
# (first seen with shared_preferences_android). Full (non-incremental) Kotlin
# compilation avoids that code path.
kotlin.incremental=false
